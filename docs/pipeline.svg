<svg width="1400" height="460" viewBox="0 0 1400 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bayesian heading observer pipeline</title>
  <desc id="desc">The model separates optic-flow encoding, Bayesian perceptual inference, the internal percept estimate, and the final perception-action report mapping.</desc>
  <rect width="1400" height="460" rx="24" fill="#FAF7F0"/>
  <rect x="1.5" y="1.5" width="1397" height="457" rx="22.5" stroke="#DDD5C8" stroke-width="3"/>
  <defs>
    <filter id="softShadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#3A2D1F" flood-opacity="0.08"/>
    </filter>
  </defs>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="62" y="60" fill="#161616" font-size="31" font-weight="760">Bayesian heading observer: inference vs. action mapping</text>
    <text x="62" y="92" fill="#5F574D" font-size="18">Key separation: internal heading estimate first, final reported heading second.</text>

    <g filter="url(#softShadow)">
      <rect x="62" y="146" width="178" height="106" rx="16" fill="#ECE8DD" stroke="#CFC6B8" stroke-width="1.5"/>
      <text x="86" y="187" fill="#171717" font-size="20" font-weight="720">Optic flow</text>
      <text x="86" y="219" fill="#4B5563" font-size="15">heading cues</text>
    </g>
    <path d="M258 199 H305" stroke="#2F3744" stroke-width="2.6" stroke-linecap="round"/>
    <polygon points="315,199 303,192 303,206" fill="#2F3744"/>

    <g filter="url(#softShadow)">
      <rect x="336" y="146" width="202" height="106" rx="16" fill="#E7F1EE" stroke="#9DBEB4" stroke-width="1.5"/>
      <text x="360" y="187" fill="#171717" font-size="20" font-weight="720">Sensory code</text>
      <text x="360" y="219" fill="#4B5563" font-size="15">noisy efficient code</text>
    </g>
    <path d="M556 199 H603" stroke="#2F3744" stroke-width="2.6" stroke-linecap="round"/>
    <polygon points="613,199 601,192 601,206" fill="#2F3744"/>

    <g filter="url(#softShadow)">
      <rect x="634" y="146" width="226" height="106" rx="16" fill="#F7E6BD" stroke="#D9A441" stroke-width="1.5"/>
      <text x="658" y="184" fill="#171717" font-size="19" font-weight="720">Bayesian decode</text>
      <text x="658" y="215" fill="#4B5563" font-size="14.5">posterior over heading</text>
    </g>
    <path d="M878 199 H925" stroke="#2F3744" stroke-width="2.6" stroke-linecap="round"/>
    <polygon points="935,199 923,192 923,206" fill="#2F3744"/>

    <g filter="url(#softShadow)">
      <rect x="956" y="146" width="222" height="106" rx="16" fill="#E4F0D8" stroke="#A8C985" stroke-width="1.5"/>
      <text x="980" y="184" fill="#171717" font-size="19" font-weight="720">Percept estimate</text>
      <text x="980" y="215" fill="#4B5563" font-size="14.5">internal heading estimate</text>
    </g>
    <path d="M1196 199 H1227" stroke="#2F3744" stroke-width="2.6" stroke-linecap="round"/>
    <polygon points="1237,199 1225,192 1225,206" fill="#2F3744"/>

    <g filter="url(#softShadow)">
      <rect x="1254" y="146" width="132" height="106" rx="16" fill="#F3DED8" stroke="#D58B78" stroke-width="1.5"/>
      <text x="1276" y="187" fill="#171717" font-size="20" font-weight="720">Report</text>
      <text x="1276" y="219" fill="#4B5563" font-size="15">action bias</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="292" y="316" width="332" height="76" rx="15" fill="#F3F0E8" stroke="#CCC3B5" stroke-width="1.5"/>
      <text x="316" y="347" fill="#171717" font-size="18" font-weight="720">History / previous headings</text>
      <text x="316" y="371" fill="#5F574D" font-size="14">serial-dependence context</text>
    </g>
    <path d="M624 354 C708 354 722 292 746 264" stroke="#6B7280" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <polygon points="748,262 733,266 743,276" fill="#6B7280"/>

    <g filter="url(#softShadow)">
      <rect x="906" y="316" width="390" height="76" rx="15" fill="#FFF1DC" stroke="#E5A661" stroke-width="1.5"/>
      <text x="930" y="347" fill="#171717" font-size="18" font-weight="720">Response-range mapping</text>
      <text x="930" y="371" fill="#5F574D" font-size="14">reported heading = alpha_i * perceptual estimate</text>
    </g>
    <path d="M1067 316 V278" stroke="#6B7280" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <polygon points="1067,267 1060,281 1074,281" fill="#6B7280"/>

    <text x="62" y="425" fill="#0F766E" font-size="18" font-weight="730">Outputs: bias curves, response variability, heatmaps, and fitted gains.</text>
  </g>
</svg>
